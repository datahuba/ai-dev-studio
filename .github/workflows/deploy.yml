name: Deploy AI Dev Studio to VPS

on:
  push:
    branches:
      - develop_kevin

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verificar credenciales SSH (Secrets)
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ] || [ -z "${{ secrets.VPS_USER }}" ] || [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "ERROR: Faltan configurar los secretos en GitHub."
            echo "Ve a: Settings > Secrets and variables > Actions > New repository secret"
            echo "Añade: VPS_HOST (ej. 123.45.67.89), VPS_USER (ej. ubuntu), y VPS_SSH_KEY (tu llave privada)."
            exit 1
          fi
          echo "Secretos detectados. Procediendo con la conexión SSH."

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            if [ ! -d "/home/ubuntu/ai-dev-studio/.git" ]; then
              git clone -b develop_kevin https://github.com/datahuba/ai-dev-studio.git /home/ubuntu/ai-dev-studio
            fi
            
            cd /home/ubuntu/ai-dev-studio
            git fetch origin develop_kevin
            git reset --hard origin/develop_kevin
            
            docker compose up -d --build
