name: Deploy AI Dev Studio to VPS

on:
  push:
    branches:
      - develop_kevin

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Crear directorio si no existe o clonar repositorio
            if [ ! -d "/home/ubuntu/ai-dev-studio/.git" ]; then
              git clone -b develop_kevin https://github.com/datahuba/ai-dev-studio.git /home/ubuntu/ai-dev-studio
            fi
            
            cd /home/ubuntu/ai-dev-studio
            git fetch origin develop_kevin
            git reset --hard origin/develop_kevin
            
            # Reconstruir y levantar contenedores
            docker compose up -d --build
