name: Deploy AI Dev Studio to VPS

on:
  push:
    branches:
      - develop_kevin

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        script: |
          mkdir -p /root/ai-dev-studio
          cd /root/ai-dev-studio
          
          if [ ! -d ".git" ]; then
            git init
            git remote add origin https://github.com/datahuba/ai-dev-studio.git
          fi
          
          git fetch origin develop_kevin
          git checkout -B develop_kevin origin/develop_kevin
          git reset --hard origin/develop_kevin
          
          # Forzar la reescritura del archivo .env para sincronizar claves
          echo "WINDSURF_API_URL=http://windsurf-api:3003/v1" > .env
          echo "WINDSURF_API_KEY=DataHubAnalytics2025" >> .env
          
          docker-compose down || true
          docker-compose up -d --build
          