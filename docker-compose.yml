version: '3.8'
services:
  ai-dev-studio:
    build: .
    container_name: ai-dev-studio
    restart: always
    volumes:
      - /home/ubuntu/datahub:/workspace/datahub
      - ./memory:/app/memory
      - ./output:/app/output
    env_file:
      - .env
    networks:
      - internal-network

networks:
  internal-network:
    external: true
    name: windsurf_network
