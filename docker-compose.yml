services:
  ai-agents:
    build: .
    container_name: ai-dev-studio-agents
    restart: always
    volumes:
      - /home/ubuntu/datahub:/workspace/datahub
      - .:/app
    environment:
      - WINDSURF_API_BASE=http://windsurf-api:3003/v1
    networks:
      - ai-network

  windsurf-api:
    image: node:18-alpine
    container_name: windsurf-api-proxy
    restart: always
    volumes:
      - ./proxy:/app
    working_dir: /app
    ports:
      - "3003:3003"
    networks:
      - ai-network
    command: ["node", "server.js"]

networks:
  ai-network:
    driver: bridge