version: '3.8'

services:
  # 1. Proxy de IA (Windsurf API)
  windsurf-api:
    image: ghcr.io/dwgx/windsurf-api:latest
    container_name: windsurf-api
    restart: always
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - API_KEY=DataHubAnalytics2025
      - DASHBOARD_PASSWORD=DataHubAnalytics2025
      - DATA_DIR=/opt/windsurf
    volumes:
      - /opt/windsurf:/opt/windsurf
    networks:
      - ai_network

  # 2. Orquestador de Agentes (AI Dev Studio)
  ai-dev-studio:
    build: .
    container_name: ai-dev-studio
    restart: always
    depends_on:
      - windsurf-api
    # Mantenemos el contenedor vivo esperando instrucciones por consola
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      # El proyecto productivo queda protegido en modo SOLO-LECTURA (ro) para contexto
      - /root/datahub:/workspace/datahub:ro
      # Directorio sandbox aislado donde los agentes crearán nuevos proyectos desde cero
      - /root/ai-dev-projects:/workspace/projects
      - ./memory:/app/memory
      - ./output:/app/output
    env_file:
      - .env
    networks:
      - ai_network

networks:
  ai_network:
    driver: bridge
    