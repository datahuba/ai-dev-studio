version: '3.8'

services:
  # 1. Proxy de IA (Windsurf API)
  windsurf-api:
    image: guanxiaol/windsurf-api:latest
    container_name: windsurf-api
    restart: always
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - API_KEY=tu_clave_secreta_vps_3003
    volumes:
      - /opt/windsurf:/opt/windsurf
    networks:
      - ai_network

  # 2. Orquestador de Agentes (AI Dev Studio)
  ai-dev-studio:
    build: .
    container_name: ai-dev-studio
    restart: always
    depends_on:
      - windsurf-api
    volumes:
      - /home/ubuntu/datahub:/workspace/datahub
      - ./memory:/app/memory
      - ./output:/app/output
    env_file:
      - .env
    networks:
      - ai_network

networks:
  ai_network:
    driver: bridge